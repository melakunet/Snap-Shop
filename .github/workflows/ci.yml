name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: SwiftLint & SwiftFormat
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Install SwiftFormat
        run: brew install swiftformat

      - name: Run SwiftLint
        run: swiftlint lint --strict --reporter github-actions-logging

      - name: Run SwiftFormat (lint only)
        run: swiftformat . --lint

  build-and-test:
    name: Build & Test
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Resolve Simulator Destination
        run: |
          python3 -c "
          import subprocess, json, sys
          out = subprocess.run(['xcrun','simctl','list','devices','available','--json'],
                               capture_output=True, text=True).stdout
          data = json.loads(out)
          for rt, devs in data.get('devices',{}).items():
              if 'iOS' in rt:
                  for d in devs:
                      if 'iPhone' in d.get('name','') and d.get('isAvailable', False):
                          print(d['udid'])
                          sys.exit(0)
          for rt, devs in data.get('devices',{}).items():
              for d in devs:
                  if 'Vision Pro' in d.get('name','') and d.get('isAvailable', False):
                      print('visionos:' + d['udid'])
                      sys.exit(0)
          " > /tmp/simudid.txt 2>/dev/null || echo "" > /tmp/simudid.txt
          SIMUDID=$(cat /tmp/simudid.txt)
          if [[ "$SIMUDID" == visionos:* ]]; then
            DEST="platform=visionOS Simulator,variant=Designed for [iPad,iPhone],id=${SIMUDID#visionos:}"
          elif [ -n "$SIMUDID" ]; then
            DEST="platform=iOS Simulator,id=$SIMUDID"
          else
            DEST="platform=iOS Simulator,OS=latest,name=iPhone 16 Pro"
          fi
          echo "SIM_DEST=$DEST" >> "$GITHUB_ENV"
          echo "Resolved destination: $DEST"

      - name: Build & Test
        run: |
          set -o pipefail
          xcodebuild test \
            -project 'Snap&Shop.xcodeproj' \
            -scheme 'Snap&Shop' \
            -destination "$SIM_DEST" \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults.xcresult
